server.port=8080
spring.application.name=userService


## Database
spring.datasource.url=jdbc:mysql://localhost:3306/ms_userDB?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=ms_userDB_user
spring.datasource.password=0408@ms_userDB

## JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ensure data.sql runs after Hibernate initializes the schema
#spring.sql.init.mode=always
#spring.jpa.defer-datasource-initialization=true

# Eureka Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.instance.prefer-ip-address=true